{% extends 'commonpage.html' %}
{% load static %}
{% block content %}

<style>
    .auth-page-wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f4f7f6 0%, #e9eeee 100%);
        padding: 60px 20px;
    }

    .auth-card {
        background: #fff;
        border-radius: 30px;
        width: 100%;
        max-width: 600px;
        padding: 50px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        border: 1px solid rgba(0,0,0,0.03);
        position: relative;
        overflow: hidden;
    }
    
    .auth-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 6px;
        background: linear-gradient(to right, #e53935, #1a1a2e);
    }

    .auth-header { text-align: center; margin-bottom: 40px; }
    .auth-header h2 { font-weight: 800; font-size: 2.2rem; color: #1a1a2e; letter-spacing: -1px; }
    .auth-header h2 span { color: #e53935; }
    .auth-header p { color: #888; font-weight: 500; font-size: 0.95rem; }

    .form-group-premium { margin-bottom: 25px; position: relative; }
    .form-group-premium label {
        display: block;
        font-weight: 700;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: #999;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }
    .form-control-premium {
        width: 100%;
        padding: 15px 20px;
        background: #fcfcfc;
        border: 2px solid #f1f3f5;
        border-radius: 12px;
        font-family: 'Outfit', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s;
    }
    .form-control-premium:focus {
        outline: none;
        background: #fff;
        border-color: #e53935;
        box-shadow: 0 10px 20px rgba(229, 57, 53, 0.05);
    }

    .row-premium { display: flex; gap: 20px; }
    .row-premium > div { flex: 1; }

    .btn-auth-primary {
        width: 100%;
        padding: 18px;
        background: #1a1a2e;
        color: #fff;
        border: none;
        border-radius: 15px;
        font-weight: 700;
        font-size: 1.1rem;
        margin-top: 20px;
        transition: 0.3s;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(26, 26, 46, 0.15);
    }
    .btn-auth-primary:hover {
        background: #e53935;
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(229, 57, 53, 0.2);
    }

    .auth-footer { text-align: center; margin-top: 30px; font-size: 0.95rem; }
    .auth-footer a { color: #e53935; font-weight: 700; text-decoration: none; }
</style>

<script>
    function validateForm() {
        var dobInput = document.getElementById('dob');
        var dob = new Date(dobInput.value);
        var currentDate = new Date();

        var ageDiff = currentDate.getFullYear() - dob.getFullYear();
        var isOver18 = (ageDiff > 18) || (ageDiff === 18 && currentDate.getMonth() > dob.getMonth()) || (ageDiff === 18 && currentDate.getMonth() === dob.getMonth() && currentDate.getDate() >= dob.getDate());

        if (!isOver18) {
            alert("Riders must be at least 18 years old to register.");
            return false;
        }
        return true;
    }
</script>

<div class="auth-page-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Rider <span>Registration</span></h2>
            <p>Join the community and start your journey</p>
        </div>

        <form method="post" onsubmit="return validateForm();">
            {% csrf_token %}
            
            <div class="form-group-premium">
                <label>Official Name</label>
                <input type="text" name="ridername" class="form-control-premium" placeholder="Enter your full name" pattern="[a-zA-Z ]+" required>
            </div>

            <div class="row-premium">
                <div class="form-group-premium">
                    <label>Username / Handle</label>
                    <input type="text" name="username" class="form-control-premium" placeholder="Choose a handle" required>
                </div>
                <div class="form-group-premium">
                    <label>Date of Birth</label>
                    <input type="date" name="DOB" id="dob" class="form-control-premium" required>
                </div>
            </div>

            <div class="form-group-premium">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control-premium" placeholder="name@example.com" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" required>
            </div>

            <div class="form-group-premium">
                <label>Secure Password</label>
                <input type="password" name="password" class="form-control-premium" placeholder="At least 8 characters" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" title="Must contain uppercase, lowercase, digit, and special char." required>
            </div>

            <div class="row-premium">
                <div class="form-group-premium">
                    <label>Phone Number</label>
                    <input type="tel" name="phonenumber" class="form-control-premium" placeholder="10-digit number" maxlength="10" pattern="[6-9][0-9]{9}" required>
                </div>
                <div class="form-group-premium">
                    <label>Primary Location</label>
                    <input type="text" name="address" class="form-control-premium" placeholder="e.g. Kochi, KL" required>
                </div>
            </div>

            <button type="submit" class="btn-auth-primary">Create Rider Profile</button>
        </form>

        <div class="auth-footer">
            <span class="text-muted">Already have an account?</span>
            <a href="/login" class="ml-2">Sign In here</a>
        </div>
    </div>
</div>
{% endblock %}
