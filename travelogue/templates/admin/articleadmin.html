{% extends "admin/commonpageadmin.html" %}
{% load static %}
{% block content %}

<style>
  .article-container {
    max-width: 800px;
    margin: 40px auto 100px;
  }
  .article-card {
    background: #fff;
    border-radius: 24px;
    padding: 50px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    border: 1px solid #f0f0f0;
    position: relative;
    overflow: hidden;
  }
  .article-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 5px;
    background: #e53935;
  }

  .article-tag {
    display: inline-block;
    padding: 5px 12px;
    background: #fdf2f2;
    color: #e53935;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
  }

  .article-title {
    font-size: 2.2rem;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 30px;
    line-height: 1.2;
  }
  
  .article-body {
    font-size: 1.1rem;
    line-height: 1.8;
    color: #444;
    white-space: pre-line;
  }

  .article-footer {
    margin-top: 40px;
    padding-top: 25px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .btn-back-admin {
    color: #999;
    font-weight: 700;
    text-decoration: none !important;
    transition: 0.2s;
    font-size: 0.9rem;
  }
  .btn-back-admin:hover { color: #e53935; }
</style>

<div class="article-container">
  {% for data in artcle %}
  <div class="article-card">
    <span class="article-tag">Admin Review</span>
    <h1 class="article-title">{{ data.articlename }}</h1>
    <div class="article-body">
      {{ data.articles }}
    </div>
    
    <div class="article-footer">
      <a href="javascript:history.back()" class="btn-back-admin">
        <i class="fas fa-arrow-left mr-2"></i> Back to Directory
      </a>
      <div class="text-muted small">
        <i class="fas fa-user-shield mr-1"></i> Admin Oversight
      </div>
    </div>
  </div>
  {% endfor %}
</div>

{% endblock %}
