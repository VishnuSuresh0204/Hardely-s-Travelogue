{% extends 'club/commonpageclub.html'%}
{% load static %}
{% block content %}

<style>
    .form-container {
        max-width: 700px;
        margin: 40px auto 100px;
    }
    .premium-form-card {
        background: #fff;
        border-radius: 24px;
        padding: 50px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        border: 1px solid #f0f0f0;
    }
    .form-header { text-align: center; margin-bottom: 40px; }
    .form-header h2 { font-weight: 800; font-size: 2rem; color: #1a1a2e; }
    .form-header h2 span { color: #e53935; }
    
    .form-group { margin-bottom: 25px; }
    .form-group label {
        display: block;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 10px;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .form-control-premium {
        width: 100%;
        padding: 15px 20px;
        background: #fcfcfc;
        border: 2px solid #f0f0f0;
        border-radius: 12px;
        font-family: 'Outfit', sans-serif;
        font-size: 1rem;
        transition: all 0.3s;
    }
    .form-control-premium:focus {
        outline: none;
        border-color: #e53935;
        background: #fff;
        box-shadow: 0 5px 15px rgba(229, 57, 53, 0.05);
    }

    .btn-post {
        width: 100%;
        padding: 16px;
        background: #1a1a2e;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        margin-top: 20px;
        transition: 0.3s;
        cursor: pointer;
    }
    .btn-post:hover { background: #e53935; transform: translateY(-2px); }
</style>

<div class="form-container">
    <div class="premium-form-card">
        <div class="form-header">
            <h2>Write <span>Article</span></h2>
            <p class="text-muted">Share riding tips, routes, or club news</p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>Article Heading</label>
                <input type="text" name="articlename" class="form-control-premium" placeholder="Enter a catchy title..." required>
            </div>

            <div class="form-group">
                <label>Content</label>
                <textarea name="article" class="form-control-premium" style="height: 300px;" placeholder="Write your story here..." required></textarea>
            </div>

            <button type="submit" class="btn-post">Publish Article</button>
            <input type="reset" value="Clear" class="btn-link btn-block mt-3 text-muted small border-0 bg-transparent">
        </form>
    </div>
</div>

{% endblock %}
