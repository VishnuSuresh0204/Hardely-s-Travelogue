{% extends "club/commonpageclub.html" %}
{% load static %}
{% block content %}


<style>
    .form-container {
        max-width: 600px;
        margin: 40px auto 100px;
    }
    .premium-form-card {
        background: #fff;
        border-radius: 24px;
        padding: 50px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        border: 1px solid #f0f0f0;
    }
    .form-header { text-align: center; margin-bottom: 40px; }
    .form-header h2 { font-weight: 800; font-size: 2rem; color: #1a1a2e; }
    .form-header h2 span { color: #e53935; }
    
    .form-group { margin-bottom: 25px; }
    .form-group label {
        display: block;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 10px;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .form-control-premium {
        width: 100%;
        padding: 15px 20px;
        background: #fcfcfc;
        border: 2px solid #f0f0f0;
        border-radius: 12px;
        font-family: 'Outfit', sans-serif;
        font-size: 1rem;
        transition: all 0.3s;
    }
    .form-control-premium:focus {
        outline: none;
        border-color: #e53935;
        background: #fff;
        box-shadow: 0 5px 15px rgba(229, 57, 53, 0.05);
    }

    .custom-file-upload {
        display: block;
        width: 100%;
        padding: 20px;
        background: #fdf2f2;
        border: 2px dashed #e53935;
        border-radius: 12px;
        text-align: center;
        color: #e53935;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
    }
    .custom-file-upload:hover { background: #feebeb; }
    .file-selected { border-style: solid; border-color: #2e7d32; color: #2e7d32; background: #e8f5e9; }

    .btn-add-vehicle {
        width: 100%;
        padding: 16px;
        background: #1a1a2e;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        margin-top: 30px;
        transition: 0.3s;
        cursor: pointer;
    }
    .btn-add-vehicle:hover { background: #e53935; transform: translateY(-2px); }
</style>

<div class="form-container">
    <div class="premium-form-card">
        <div class="form-header">
            <h2>Add to <span>Garage</span></h2>
            <p class="text-muted">List a new vehicle for community rental</p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>Vehicle Name</label>
                <input type="text" name="bikename" class="form-control-premium" placeholder="e.g. Royal Enfield Himalayan" required>
            </div>

            <div class="form-group">
                <label>Rent Per Day (₹)</label>
                <input type="number" name="rent" class="form-control-premium" placeholder="e.g. 1500" required>
            </div>

            <div class="form-group">
                <label>Vehicle Image</label>
                <input type="file" name="image" id="vehicleImg" style="display: none;" required onchange="updateFileName(this)">
                <label for="vehicleImg" class="custom-file-upload" id="fileLabel">
                    <i class="fas fa-cloud-upload-alt mr-2"></i> Click to Upload Photo
                </label>
            </div>

            <button type="submit" class="btn-add-vehicle">List Vehicle</button>
        </form>
    </div>
</div>

<script>
    function updateFileName(input) {
        var label = document.getElementById('fileLabel');
        if (input.files && input.files.length > 0) {
            label.innerHTML = '<i class="fas fa-check-circle mr-2"></i> ' + input.files[0].name;
            label.classList.add('file-selected');
        }
    }
</script>
{% endblock %}
