{% extends 'club/commonpageclub.html' %}
{% block content %}
{% for message in messages %}
<script>alert('{{ message }}')</script>
{% endfor %}

<style>
  .admin-hero {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 16px;
    padding: 50px 30px;
    text-align: center;
    color: #fff;
    margin-bottom: 40px;
  }
  .admin-hero h2 { font-weight: 800; font-size: 2.4rem; margin-bottom: 10px; }
  .admin-hero h2 span { color: #e53935; }

  .inventory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 30px;
    margin-bottom: 80px;
  }

  .inventory-card {
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    border: 1px solid #eee;
    transition: transform 0.3s;
  }
  .inventory-card:hover { transform: translateY(-5px); }

  .vehicle-img { height: 200px; overflow: hidden; position: relative; }
  .vehicle-img img { width: 100%; height: 100%; object-fit: cover; }
  
  .card-body-premium { padding: 25px; }
  
  .input-label {
    display: block;
    font-size: 0.75rem;
    font-weight: 800;
    color: #999;
    text-transform: uppercase;
    margin-bottom: 5px;
    letter-spacing: 0.5px;
  }
  .form-control-inline {
    width: 100%;
    padding: 10px 15px;
    background: #fcfcfc;
    border: 1px solid #f0f0f0;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 15px;
    transition: 0.2s;
  }
  .form-control-inline:focus { border-color: #e53935; outline: none; background: #fff; }

  .file-input-wrap { margin-bottom: 20px; }
  .file-input-inline { font-size: 0.8rem; color: #666; }

  .card-actions { display: flex; gap: 10px; border-top: 1px solid #f9f9f9; padding-top: 20px; }
  .btn-update {
    flex: 2;
    padding: 10px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn-update:hover { background: #e53935; }

  .btn-delete-card {
    flex: 1;
    padding: 10px;
    background: #ffebee;
    color: #c62828;
    text-align: center;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.85rem;
    text-decoration: none !important;
    transition: 0.2s;
  }
  .btn-delete-card:hover { background: #c62828; color: #fff; }

  .custom-file-upload {
    display: block;
    width: 100%;
    padding: 12px;
    background: #fdf2f2;
    border: 2px dashed #e53935;
    border-radius: 10px;
    text-align: center;
    color: #e53935;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    font-size: 0.85rem;
  }
  .custom-file-upload:hover { background: #feebeb; }
  .file-selected { border-style: solid; border-color: #2e7d32; color: #2e7d32; background: #e8f5e9; }
</style>

<div class="admin-hero">
  <h2>Our <span>Garage</span></h2>
  <p>Manage your rental fleet and update vehicle availability.</p>
</div>

<div class="inventory-grid">
  {% for data in rent %}
  <div class="inventory-card">
    <div class="vehicle-img">
      {% if data.images %}
        <img src="{{ data.images.url }}" alt="Vehicle" id="preview-{{ data.id }}">
      {% endif %}
    </div>
    <div class="card-body-premium">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input name="ID" type="hidden" value="{{ data.id }}" />
        
        <div class="form-group mb-3">
          <label class="input-label">Vehicle Name</label>
          <input name="bikename" type="text" class="form-control-inline" value="{{ data.productname }}" required>
        </div>

        <div class="form-group mb-3">
          <label class="input-label">Rent Per Day (₹)</label>
          <input name="rent" type="number" class="form-control-inline" value="{{ data.rent }}" required>
        </div>

        <div class="file-input-wrap">
          <label class="input-label">Vehicle Photo</label>
          <input name="image" type="file" id="rentImg-{{ data.id }}" style="display: none;" onchange="updateFileName(this, '{{ data.id }}')">
          <label for="rentImg-{{ data.id }}" class="custom-file-upload" id="label-{{ data.id }}">
            <i class="fas fa-camera mr-2"></i> Update Photo
          </label>
        </div>

        <div class="card-actions">
          <button type="submit" class="btn-update">Update Vehicle</button>
          <a href="/deleterent?id={{ data.id }}" class="btn-delete-card" onclick="return confirm('Delete this vehicle from garage?')">Delete</a>
        </div>
      </form>
    </div>
  </div>
  {% endfor %}
</div>

<script>
    function updateFileName(input, id) {
        var label = document.getElementById('label-' + id);
        var preview = document.getElementById('preview-' + id);
        
        if (input.files && input.files.length > 0) {
            label.innerHTML = '<i class="fas fa-check-circle mr-2"></i> ' + input.files[0].name;
            label.classList.add('file-selected');
            
            var reader = new FileReader();
            reader.onload = function(e) {
                if(preview) preview.src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
