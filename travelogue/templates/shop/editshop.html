{% extends 'shop/commonpageshop.html' %}
{% load static %}
{% block content %}

<style>
    .form-container {
        max-width: 600px;
        margin: 40px auto 100px;
    }
    .premium-form-card {
        background: #fff;
        border-radius: 24px;
        padding: 50px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        border: 1px solid #f0f0f0;
    }
    .form-header { text-align: center; margin-bottom: 40px; }
    .form-header h2 { font-weight: 800; font-size: 2rem; color: #1a1a2e; }
    .form-header h2 span { color: #e53935; }
    
    .form-group { margin-bottom: 25px; }
    .form-group label {
        display: block;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 10px;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .form-control-premium {
        width: 100%;
        padding: 15px 20px;
        background: #fcfcfc;
        border: 2px solid #f0f0f0;
        border-radius: 12px;
        font-family: 'Outfit', sans-serif;
        font-size: 1rem;
        transition: all 0.3s;
    }
    .form-control-premium:focus {
        outline: none;
        border-color: #e53935;
        background: #fff;
        box-shadow: 0 5px 15px rgba(229, 57, 53, 0.05);
    }

    .btn-save {
        width: 100%;
        padding: 16px;
        background: #1a1a2e;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        margin-top: 20px;
        transition: 0.3s;
        cursor: pointer;
    }
    .btn-save:hover { background: #e53935; transform: translateY(-2px); }
    
    .btn-cancel {
        display: block;
        width: 100%;
        text-align: center;
        background: transparent;
        border: none;
        color: #999;
        font-weight: 600;
        margin-top: 15px;
        font-size: 0.9rem;
        text-decoration: none !important;
    }
</style>

<div class="form-container">
    <div class="premium-form-card">
        <div class="form-header">
            <h2>Edit <span>Storefront</span></h2>
            <p class="text-muted">Update your shop's official business information</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Merchant Handle</label>
                <input type="text" name="username" value="{{ shop.username }}" class="form-control-premium" required>
            </div>

            <div class="form-group">
                <label>Official Shop Name</label>
                <input type="text" name="shopname" value="{{ shop.shopname }}" class="form-control-premium" pattern="[a-zA-Z ]+" required>
            </div>

            <div class="form-group">
                <label>Store Location</label>
                <input type="text" name="location" value="{{ shop.location }}" class="form-control-premium" required>
            </div>

            <div class="form-group">
                <label>Merchant Phone (10 Digits)</label>
                <input type="text" name="phonenumber" value="{{ shop.phonenumber }}" minlength="10" maxlength="10" class="form-control-premium" required>
            </div>

            <button type="submit" class="btn-save">Save Store Changes</button>
            <a href="/shopprofile" class="btn-cancel">Cancel & Go Back</a>
        </form>
    </div>
</div>

{% endblock %}
