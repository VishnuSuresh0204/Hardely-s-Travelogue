{% extends 'user/commonpageuser.html' %}
{% load static %}
{% block content %}

<style>
  /* ── Profile Hero ── */
  .profile-hero {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 16px;
    padding: 80px 32px;
    margin-bottom: 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  
  .profile-header-card {
    background: #fff;
    border-radius: 24px;
    padding: 40px;
    margin-top: -60px;
    box-shadow: 0 10px 40px rgba(0,0,0,.1);
    position: relative;
    z-index: 10;
  }

  .avatar-wrap {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 5px solid #fff;
    box-shadow: 0 5px 20px rgba(0,0,0,.15);
    margin: -110px auto 20px;
    overflow: hidden;
    background: #f8f9fa;
  }
  .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

  .profile-name { font-size: 1.8rem; font-weight: 800; color: #1a1a2e; margin-bottom: 5px; }
  .rider-name { font-size: 1.1rem; color: #e53935; font-weight: 600; margin-bottom: 25px; display: block; }

  .profile-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-bottom: 35px;
    border-top: 1px solid #f0f0f0;
    padding-top: 25px;
  }
  .stat-box { text-align: center; }
  .stat-val { display: block; font-size: 1.4rem; font-weight: 800; color: #1a1a2e; }
  .stat-label { font-size: 0.8rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }

  .profile-info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
    text-align: left;
    background: #fcfcfc;
    border-radius: 16px;
    padding: 30px;
    border: 1px solid #f0f0f0;
  }
  .info-item label { display: block; font-size: 0.75rem; color: #aaa; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
  .info-item p { font-size: 1.05rem; color: #1a1a2e; font-weight: 600; margin: 0; }

  .btn-edit-profile {
    background: #1a1a2e;
    color: #fff;
    padding: 14px 40px;
    border-radius: 12px;
    font-weight: 700;
    margin-top: 40px;
    transition: all .2s;
    display: inline-block;
    text-decoration: none !important;
  }
  .btn-edit-profile:hover { background: #e53935; transform: translateY(-2px); color: #fff; }
</style>

<div class="profile-hero">
</div>

<div class="container pb-5">
  <div class="mx-auto" style="max-width: 800px;">
    {% for d in user %}
    <div class="profile-header-card text-center">
      <div class="avatar-wrap">
        {% if d.images %}
          <img src="{{ d.images.url }}" alt="Avatar">
        {% else %}
          <img src="{% static 'images/default-user.jpg' %}" alt="Avatar">
        {% endif %}
      </div>
      
      <h2 class="profile-name">{{ d.username }}</h2>
      <span class="rider-name">@{{ d.ridername }}</span>

      <!-- <div class="profile-stats">
        <div class="stat-box">
          <span class="stat-val">12</span>
          <span class="stat-label">Events</span>
        </div>
        <div class="stat-box">
          <span class="stat-val">5</span>
          <span class="stat-label">Clubs</span>
        </div>
      </div> -->

      <div class="profile-info-grid">
        <div class="info-item">
          <label>Email Address</label>
          <p>{{ d.email }}</p>
        </div>
        <div class="info-item">
          <label>Phone Number</label>
          <p>{{ d.phonenumber }}</p>
        </div>
        <div class="info-item">
          <label>Date of Birth</label>
          <p>{{ d.DOB }}</p>
        </div>
        <div class="info-item" style="grid-column: 1 / -1;">
          <label>Address</label>
          <p>{{ d.address }}</p>
        </div>
      </div>

      <a href="/editprofile" class="btn-edit-profile">
        <i class="fas fa-user-edit mr-2"></i> Edit Account Settings
      </a>
    </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
