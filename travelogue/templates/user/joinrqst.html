{% extends "user/commonpageuser.html" %}
{% load static %}
{% block content %}

<style>
  .join-container {
    max-width: 600px;
    margin: 80px auto;
    background: #fff;
    border-radius: 24px;
    padding: 50px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    border: 1px solid #f0f0f0;
    text-align: center;
  }

  .join-icon {
    font-size: 3.5rem;
    color: #e53935;
    margin-bottom: 25px;
  }

  .join-container h2 {
    font-size: 1.8rem;
    font-weight: 800;
    color: #1a1a2e;
    margin-bottom: 15px;
  }
  .join-container p {
      color: #777;
      margin-bottom: 40px;
      line-height: 1.6;
  }

  .join-input-group {
    background: #fcfcfc;
    padding: 30px;
    border-radius: 16px;
    border: 1px solid #f0f0f0;
    margin-bottom: 30px;
  }
  
  .join-input {
    width: 100%;
    padding: 14px 20px;
    border: 2px solid #eee;
    border-radius: 12px;
    text-align: center;
    font-size: 1.1rem;
    font-weight: 600;
    transition: border-color .2s;
  }
  .join-input:focus { outline: none; border-color: #e53935; }

  .btn-submit-join {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: #fff;
    border: none;
    padding: 16px 40px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1rem;
    width: 100%;
    transition: all .2s;
    cursor: pointer;
  }
  .btn-submit-join:hover {
    background: #e53935;
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(229, 57, 53, 0.3);
    color: #fff;
  }
</style>

<div class="join-container">
  <div class="join-icon"><i class="fas fa-id-card"></i></div>
  <h2>Join Community</h2>
  <p>To confirm your membership request, please type <strong>"yes"</strong> in the field below and submit.</p>

  <form method="post">
    {% csrf_token %}
    <div class="join-input-group">
      <input type="text" name="rqst" id="rqst" class="join-input" placeholder="Enter 'yes' here" required>
    </div>
    
    <button type="submit" class="btn-submit-join">
      Send Membership Request
    </button>
  </form>
</div>

{% endblock %}
