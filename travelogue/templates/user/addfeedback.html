{% extends "user/commonpageuser.html" %}
{% load static %}
{% block content %}

{% for message in messages %} 
  <script>alert('{{ message }}');</script>   
{% endfor %} 

<style>
  /* ── Page Hero ── */
  .feedback-hero {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 16px;
    padding: 60px 32px;
    margin-bottom: 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .feedback-hero h2 {
    font-size: 2.8rem;
    font-weight: 800;
    color: #fff;
    margin-bottom: 12px;
  }
  .feedback-hero h2 span { color: #e53935; }
  .feedback-hero p { color: rgba(255,255,255,.6); margin: 0; }

  /* ── Feedback Form ── */
  .feedback-container {
    max-width: 700px;
    margin: 0 auto 100px;
    background: #fff;
    border-radius: 24px;
    padding: 50px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    border: 1px solid #f0f0f0;
  }

  .feedback-label {
    display: block;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 15px;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
  }

  .feedback-textarea {
    width: 100%;
    min-height: 200px;
    padding: 24px;
    border: 2px solid #f0f0f0;
    border-radius: 16px;
    background: #fcfcfc;
    transition: all 0.3s;
    font-size: 1.1rem;
    color: #444;
    resize: none;
    margin-bottom: 30px;
  }
  .feedback-textarea:focus {
    outline: none;
    border-color: #e53935;
    background: #fff;
    box-shadow: 0 5px 20px rgba(229, 57, 53, 0.05);
  }

  .btn-post-feedback {
    background: linear-gradient(135deg, #e53935, #c62828);
    color: #fff;
    border: none;
    padding: 18px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 1.1rem;
    width: 100%;
    box-shadow: 0 6px 20px rgba(229, 57, 53, 0.3);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-post-feedback:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(229, 57, 53, 0.4);
    opacity: 0.95;
    color: #fff;
  }
</style>

<div class="feedback-hero">
  <h2>Share <span>Feedback</span></h2>
  <p>Your thoughts help us improve the hardely's travelogue community</p>
</div>

<div class="container pb-5">
  <div class="feedback-container">
    <form method="post">
      {% csrf_token %}
      <label class="feedback-label">Your Message</label>
      <textarea name="feedback" class="feedback-textarea" placeholder="Type your experience, suggestions or feedback here..." required></textarea>
      
      <button type="submit" class="btn-post-feedback">
        <i class="fas fa-paper-plane mr-2"></i> Post Feedback
      </button>
    </form>
  </div>
</div>

{% endblock %}
